<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Website -->
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>GitHub Profile Finder</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS File -->
    <link rel="stylesheet"
    href="style.css">

</head>

<body>

    <!-- Main Container -->
    <div class="container">

        <!-- Heading -->
        <h1>

            <i class="fa-brands fa-github"></i>

            GitHub Profile Finder

        </h1>

        <!-- Search Section -->
        <div class="search-box">

            <!-- Username Input -->
            <input
            type="text"
            id="username"
            placeholder="Enter GitHub Username">

            <!-- Search Button -->
            <button id="searchBtn">

                Search

            </button>

        </div>

        <!-- Result Card -->
        <div id="profile">

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
